[platformio]
# Global PlatformIO configuration (kept minimal to avoid behavior changes)

[env]
# Auto-generate `src/ui_design.c|h` from `main_scene.json` before builds.
# Disable by setting `ESP32OS_PIO_UI_EXPORT=0`.
extra_scripts =
    pre:scripts/pio_generate_ui_design.py
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
build_src_flags =
    -Wshadow

# ── Shared base for all ESP32 targets ──────────────────────────
[esp32_base]
platform = espressif32@6.12.0
framework = espidf
build_flags =
    ${env.build_flags}
    -DHAVE_ICONS=1

# ── Shared base for ESP32 + Arduino Nano pin overrides ─────────
[arduino_nano_base]
extends = esp32_base
board = arduino_nano_esp32
build_flags =
    ${esp32_base.build_flags}
    -DDISPLAY_I2C_SDA_GPIO=11
    -DDISPLAY_I2C_SCL_GPIO=12

[env:esp32-s3-devkitm-1]
extends = esp32_base
board = esp32-s3-devkitm-1

# Optimized release build with LTO for smaller binary
[env:esp32-s3-devkitm-1-release]
extends = esp32_base
board = esp32-s3-devkitm-1
build_flags =
    ${esp32_base.build_flags}
    -Os
    -flto

# Debug build with full symbols for firmware development
[env:esp32-s3-devkitm-1-debug]
extends = esp32_base
board = esp32-s3-devkitm-1
build_type = debug
build_flags =
    ${esp32_base.build_flags}
    -Og
    -g3
    -DDEBUG=1

# HW-friendly alternative that gracefully skips when no board is connected.
# Run with: pio test -e esp32-s3-devkitm-1-nohw
[env:esp32-s3-devkitm-1-nohw]
extends = esp32_base
board = esp32-s3-devkitm-1
# Smart-skip env: builds tests but auto-detects board presence.
# Skips upload when no ESP32-S3 is detected, avoiding timeouts.
upload_protocol = custom
upload_command = python ${PROJECT_DIR}/scripts/skip_hw_tests.py upload

[env:arduino_nano_esp32]
extends = arduino_nano_base

# HW-friendly alternative that gracefully skips when no board is connected.
# Run with: pio test -e arduino_nano_esp32-nohw
[env:arduino_nano_esp32-nohw]
extends = arduino_nano_base
upload_protocol = custom
upload_command = python ${PROJECT_DIR}/scripts/skip_hw_tests.py upload

[env:native]
platform = native@1.2.1
build_flags =
    ${env.build_flags}
    -Itest/stubs
    -DESPOS_NATIVE=1
    -Werror
    -lm
test_build_src = true
test_filter =
    test_ui_render
    test_ui_render_swbuf
    test_ui_core
    test_ui_meta
    test_ui_nav
    test_ui_components
    test_ui_listmodel
    test_ui_helpers
    test_ui_font
    test_msgbus
    test_ui_bindings
    test_ui_cmd
    test_seesaw
    test_store
    test_gauge
    test_chart
    test_icon
    test_rpc
    test_metrics
    test_input
    test_ui_app
    test_ui_render_text
    test_ui_dirty
    test_ui_widget_style
    test_ui_rect
    test_ui_format
    test_ui_scene_util
    test_ui_border
    test_ui_text_layout
    test_ui_dither
    test_ui_render_widgets
build_src_filter =
    +<services/ui/ui_core.c>
    +<services/ui/ui_meta.c>
    +<services/ui/ui_components.c>
    +<services/ui/ui_listmodel.c>
    +<services/ui/ui_bindings.c>
    +<services/ui/ui_helpers.c>
    +<ui_nav.c>
    +<ui_render_swbuf.c>
    +<ui_render.c>
    +<ui_design.c>
    +<ui_font_6x8.c>
    +<kernel/msgbus.c>
    +<services/ui/ui_cmd.c>
    +<services/input/seesaw.c>
    +<services/rpc/rpc.c>
    +<services/metrics/metrics.c>
    +<services/input/input_logic.c>
    +<services/ui_app/ui_app_logic.c>
    +<ui_render_text.c>
    +<services/ui/ui_dirty.c>
    +<ui_widget_style.c>
    +<ui_rect.c>
    +<ui_format.c>
    +<services/ui/ui_scene_util.c>
    +<ui_border.c>
    +<ui_text_layout.c>
    +<ui_dither.c>
    +<ui_render_widgets.c>
    +<../test/stubs/ssd1363_stub.c>
    +<../test/stubs/store_stub.c>
    +<../test/stubs/i2c_stub.c>
    +<../test/stubs/nvs_stub.c>
    +<../test/stubs/uart_stub.c>
    +<../test/stubs/esp_system_stub.c>
    +<../test/stubs/esp_err_stub.c>
