[platformio]
# Global PlatformIO configuration (kept minimal to avoid behavior changes)

[env]
# Auto-generate `src/ui_design.c|h` from `main_scene.json` before builds.
# Disable by setting `ESP32OS_PIO_UI_EXPORT=0`.
extra_scripts =
    pre:scripts/pio_generate_ui_design.py

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = espidf
build_flags =
    -DHAVE_ICONS=1

# HW-friendly alternative that gracefully skips when no board is connected.
# Run with: pio test -e esp32-s3-devkitm-1-nohw
[env:esp32-s3-devkitm-1-nohw]
platform = espressif32
board = esp32-s3-devkitm-1
framework = espidf
build_flags =
    -DHAVE_ICONS=1
# Smart-skip env: builds tests but auto-detects board presence.
# Skips upload when no ESP32-S3 is detected, avoiding timeouts.
upload_protocol = custom
upload_command = python scripts/skip_hw_tests.py upload

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = espidf
build_flags =
    -DHAVE_ICONS=1
    -DDISPLAY_I2C_SDA_GPIO=11
    -DDISPLAY_I2C_SCL_GPIO=12

# HW-friendly alternative that gracefully skips when no board is connected.
# Run with: pio test -e arduino_nano_esp32-nohw
[env:arduino_nano_esp32-nohw]
platform = espressif32
board = arduino_nano_esp32
framework = espidf
build_flags =
    -DHAVE_ICONS=1
    -DDISPLAY_I2C_SDA_GPIO=11
    -DDISPLAY_I2C_SCL_GPIO=12
upload_protocol = custom
upload_command = python scripts/skip_hw_tests.py upload

[env:native]
platform = native
build_flags =
    -Itest/stubs
    -DESPOS_NATIVE=1
test_build_src = true
test_filter =
    test_ui_render_swbuf
    test_ui_core
    test_ui_meta
    test_ui_nav
    test_ui_components
    test_ui_listmodel
build_src_filter =
    +<services/ui/ui_core.c>
    +<services/ui/ui_meta.c>
    +<services/ui/ui_components.c>
    +<services/ui/ui_listmodel.c>
    +<ui_nav.c>
    +<ui_render_swbuf.c>
    +<ui_render.c>
    +<ui_design.c>
    +<ui_font_6x8.c>
    +<../test/stubs/ssd1363_stub.c>
