[tool.black]
line-length = 100
target-version = ["py39"]
extend-exclude = '''
/(
    build
  | dist
  | generated
  | __pycache__
  | \.mypy_cache
  | \.pio
  | \.platformio-local
  | \.venv
)/
'''

[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = [
    "build",
    "dist",
    "generated",
    "__pycache__",
    ".mypy_cache",
    ".pio",
    ".platformio-local",
    ".venv",
    "preview",
    "docs",
    "reports",
    "output",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear (common pitfalls)
    "S",    # flake8-bandit (security)
    "UP",   # pyupgrade (modern Python idioms)
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
    "PT",   # flake8-pytest-style
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # assert used (fine in tests)
    "S110",   # try-except-pass (intentional silencing in many places)
    "S112",   # try-except-continue (intentional skip pattern)
    "S603",   # subprocess untrusted input (we validate inputs already)
    "S607",   # partial executable path (acceptable for pio/python)
    "UP006",  # use X | Y instead of Optional/Union (requires Python 3.10+)
    "UP035",  # deprecated typing imports (requires Python 3.9+)
    "UP045",  # use X | Y in type aliases (requires Python 3.10+)
    "SIM105", # contextlib.suppress instead of try-except-pass (style preference)
    "C408",   # unnecessary dict() call (rewrite as literal — many false positives)
    "PT018",  # composite assertions (style preference, 81 occurrences)
    "RUF001", # ambiguous unicode character in string (legitimate non-ASCII)
    "RUF002", # ambiguous unicode character in docstring
    "RUF003", # ambiguous unicode character in comment
    "RUF059", # unused __all__ entry (noisy for re-export packages)
    "SIM102", # collapsible nested ifs (intentionally nested for readability)
]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]
"tools/*.py" = ["E402"]
# The MCP server bootstraps sys.path with the repo root before importing the
# espos library modules (identical pattern to tools/*.py above).
"espos_mcp/*.py" = ["E402"]
"verify_all_visual.py" = ["E402"]
"ui_designer.py" = ["E402"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
no_site_packages = true
strict_equality = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
exclude = "(build|dist|generated|\\.pio|\\.platformio-local|\\.venv|__pycache__|output)"

[tool.pytest.ini_options]
markers = [
    "timeout(seconds): mark tests with a timeout value (used by ESP32 hardware bridge tests)",
    "visual: marks tests as requiring graphical display (deselect with '-m \"not visual\"')",
    "smoke: lightweight end-to-end smoke checks (headless safe)",
]
filterwarnings = [
    "ignore::pytest.PytestExperimentalApiWarning",
    "ignore::pytest.PytestCollectionWarning",
]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
testpaths = ["tests"]
timeout = 300
timeout_method = "thread"

[tool.coverage.run]
# Scope coverage to the real product code ONLY. Previously CI used `--cov=.`
# with NO [tool.coverage] section anywhere, so coverage.py instrumented and
# retained line-data for the ENTIRE working tree — including `.venv`
# site-packages, `.pio`, `output/`, and the 2.7MB test corpus itself. Under
# `-n auto` that whole-tree coverage map was duplicated across one worker per
# logical CPU (32 on the dev host), which is the dominant contributor to the
# 100+GB-per-process memory blow-up. Restricting `source` to the actual
# packages bounds the coverage data set to a few thousand product lines per
# worker regardless of host core count.
source = [
    "cyberpunk_designer",
    "tools",
    "ui_models.py",
    "ui_designer.py",
    "ui_template_manager.py",
    "shared_undo_redo.py",
    "event_manager.py",
    "design_tokens.py",
    "constants.py",
]
branch = true
parallel = true
omit = [
    "*/.venv/*",
    "*/.pio/*",
    "*/.platformio-local/*",
    "*/tests/*",
    "*/output/*",
    "*/build/*",
    "*/dist/*",
    "*/generated/*",
    "*/__pycache__/*",
    ".claude/*",
    "demo_screenshot.py",
    "verify_all_visual.py",
]

[tool.coverage.report]
# HONEST gate. The prior `--cov-fail-under=97` was a manufactured number: the
# test/CI audit found ~23% of test LOC (19 `test_coverage_push*.py` files,
# 14,388 LOC) existed solely to force `except: pass` lines and self-admitted
# dead-code branches, with no behavioral assertions. With coverage now scoped
# to product code and the padding no longer counted against an inflated whole-
# tree denominator, 80% is a defensible floor that real behavioral tests can
# sustain without resorting to vanity padding. The number was LOWERED to a
# truthful, enforceable value — never raise it by adding assertion-free tests.
# See docs/coverage_policy.md for the full rationale.
fail_under = 80
skip_covered = true
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.mutmut]
paths_to_mutate = "cyberpunk_designer/"
tests_dir = "tests/"
runner = "python -m pytest -x -q --ignore=output --tb=no"
dict_synonyms = "Struct,NamedStruct"
