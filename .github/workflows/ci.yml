name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Dependency security audit
        run: |
          python -m pip install pip-audit
          python -m pip_audit --strict --desc
      - name: Ruff lint
        run: python -m ruff check .
      - name: Ruff format check
        run: python -m ruff format --check .
      - name: Mypy (codegen tools — strict)
        run: python -m mypy --ignore-missing-imports --no-error-summary tools/ui_codegen.py scripts/pio_generate_ui_design.py design_tokens.py shared_undo_redo.py event_manager.py constants.py
      - name: Mypy (designer — advisory)
        continue-on-error: true
        run: python -m mypy --ignore-missing-imports --no-error-summary ui_designer.py ui_models.py ui_template_manager.py || true
      - name: Validate design JSON
        run: python tools/validate_design.py main_scene.json
      - name: Codegen freshness check
        run: python scripts/check_codegen_freshness.py
      - name: Guardrail tests (designer refactors)
        run: |
          python -m pytest -q --tb=short \
            tests/test_input_handlers.py \
            tests/test_input_handlers_mouse.py \
            tests/test_focus_nav.py \
            tests/test_focus_nav_listmodel.py \
            tests/test_inspector_commit.py \
            tests/test_scene_ops.py
      - name: Run tests
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          python -m pytest -q --tb=short --ignore=output -n auto --cov=. --cov-report=term-missing:skip-covered --cov-report=html:htmlcov --cov-fail-under=97
      - name: Performance benchmarks
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/test_benchmarks.py --benchmark-only --benchmark-json=.benchmarks.json -q
      - name: Mutation testing (advisory)
        if: matrix.python-version == '3.12'
        continue-on-error: true
        timeout-minutes: 20
        run: |
          python -m mutmut run --no-progress 2>&1 | tail -30
          python -m mutmut results 2>&1 | tail -40
          python -m mutmut html 2>/dev/null || true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14
      - name: Upload benchmark results
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks.json
          retention-days: 30

  firmware:
    name: Firmware (PlatformIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PlatformIO
        uses: n-vr/setup-platformio-action@v1
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-
      - name: Native tests
        run: pio test -e native
      - name: Build ESP32-S3 (nohw)
        run: pio run -e esp32-s3-devkitm-1-nohw
      - name: Build Arduino Nano ESP32 (nohw)
        run: pio run -e arduino_nano_esp32-nohw
