name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: python -m ruff check .
      - name: Validate design JSON
        run: python tools/validate_design.py main_scene.json
      - name: Run tests
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          python -m pytest -q

  firmware:
    name: Firmware (PlatformIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PlatformIO
        uses: n-vr/setup-platformio-action@v1
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-
      - name: Native tests
        run: pio test -e native
      - name: Build ESP32-S3 (nohw)
        run: pio run -e esp32-s3-devkitm-1-nohw
      - name: Build Arduino Nano ESP32 (nohw)
        run: pio run -e arduino_nano_esp32-nohw
