name: Token Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  token-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run token lint
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          mkdir -p reports
          python tools/token_lint.py \
            --paths ui_designer.py ui_designer_preview.py ui_components.py ui_themes.py tools src \
            --ext .py .c .h \
            --out reports/token_lint_ci.txt

      - name: Run token lint for docs (HTML) with allow-list
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          mkdir -p reports
          python tools/token_lint.py \
            --paths web docs \
            --ext .html \
            --allow-file web/token_allow.txt \
            --out reports/token_lint_docs.txt

      - name: Guard allow-list changes
        env:
          ALLOW_TOKEN_ALLOWLIST_CHANGE: ${{ env.ALLOW_TOKEN_ALLOWLIST_CHANGE }}
        run: |
          set -e
          git fetch origin main:refs/remotes/origin/main || true
          if git diff --name-only origin/main...HEAD | grep -q "web/token_allow.txt"; then
            if [ "${ALLOW_TOKEN_ALLOWLIST_CHANGE:-0}" != "1" ]; then
              echo "web/token_allow.txt changed; set ALLOW_TOKEN_ALLOWLIST_CHANGE=1 to acknowledge." >&2
              exit 1
            fi
          fi

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-lint-reports
          path: reports/token_lint_*.txt
