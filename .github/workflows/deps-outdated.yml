name: Dependency Check (pip/npm)

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  python-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: List outdated pip packages
        run: pip list --outdated --format=json > outdated-pip.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: outdated-pip
          path: outdated-pip.json

  node-deps:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_designer_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: npm ci || npm install
      - name: npm outdated
        run: npm outdated --json > ../outdated-npm.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: outdated-npm
          path: ../outdated-npm.json
