name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build_installer.py

      - name: Build unified launcher variant
        run: python build_installer.py --entry launcher --archive-suffix _Launcher

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32os-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: PyInstaller version (sanity)
        run: python -m PyInstaller --version
        continue-on-error: true

      - name: PyInstaller spec dry-run (no build)
        run: |
          python build_installer.py --entry designer --no-archive --clean || true
          python build_installer.py --entry launcher --no-archive --clean || true

      - name: Generate changelog from last tag
        run: python tools/generate_changelog.py > CHANGELOG.md

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Verify artifacts exist
        run: |
          set -e
          if ! ls esp32os-*/* >/dev/null 2>&1; then
            echo "No release artifacts found (expected esp32os-*/ directories)."
            exit 1
          fi
          echo "Found artifacts:"
          ls esp32os-*/*

      - name: Build artifact summary
        run: |
          if [ -f reports/RELEASE_ARTIFACTS.md ]; then
            cp reports/RELEASE_ARTIFACTS.md RELEASE_ARTIFACTS.md
          else
            echo "# Release Artifacts Cheat Sheet" > RELEASE_ARTIFACTS.md
          fi
          python - <<'PY'
          import os
          from pathlib import Path

          md = Path("RELEASE_ARTIFACTS.md")
          md.write_text(md.read_text(encoding="utf-8") + "\n\n## Artifact listing\n", encoding="utf-8")
          lines = []
          for path in Path(".").glob("esp32os-*/*"):
              if path.is_file():
                  size_mb = path.stat().st_size / 1024 / 1024
                  lines.append(f"- {path} ({size_mb:.2f} MB)")
          if not lines:
              lines.append("- No artifacts found (did the build step run?)")
          md.write_text(md.read_text(encoding="utf-8") + "\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Build release notes (changelog + artifact summary)
        run: cat CHANGELOG.md RELEASE_ARTIFACTS.md > RELEASE_NOTES.md

      - name: Generate checksums
        run: find . -type f -path "./esp32os-*/*" -print0 | xargs -0 sha256sum > CHECKSUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            esp32os-*/*
            CHECKSUMS.txt
            RELEASE_ARTIFACTS.md
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
