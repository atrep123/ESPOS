name: Security Audit

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC
  workflow_dispatch:
    inputs:
      bandit_max_issues:
        description: 'Max allowed Bandit findings before failing'
        required: false
        default: '3'
      disallowed_licenses:
        description: 'Comma-separated list of disallowed licenses (fail if detected)'
        required: false
        default: 'GPL-3.0,AGPL-3.0,LGPL-3.0,SSPL,BUSL-1.1'

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tooling
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pip-audit safety cyclonedx-bom bandit pip-licenses
      - name: pip-audit
        run: |
          pip-audit --progress-spinner off --output json > python_vulns.json || true
          pip-audit --progress-spinner off --format sarif --output pip_audit.sarif || true
      - name: safety scan
        run: safety check --full-report > safety_report.txt || true
      - name: Bandit (security static analysis)
        run: |
          bandit -q -r . -f json -o bandit_report.json || true
          bandit -q -r . -f sarif -o bandit_report.sarif || true
      - name: SBOM (Python)
        run: cyclonedx-bom -o sbom-python.json
      - name: License scan (Python)
        run: pip-licenses --format=json --output-file=python_licenses.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: python-security
          path: |
            python_vulns.json
            safety_report.txt
            bandit_report.json
            sbom-python.json
            python_licenses.json
            pip_audit.sarif
            bandit_report.sarif

  node-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_designer_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: npm ci || npm install
      - name: npm audit
        run: npm audit --json > ../npm_vulns.json || true
      - name: npm audit SARIF
        run: python ../tools/npm_audit_to_sarif.py ../npm_vulns.json ../npm_audit.sarif || true
      - name: SBOM (Node)
        run: npx @cyclonedx/cyclonedx-npm --output-file ../sbom-node.json --include-dev || true
      - name: License scan (Node)
        run: |
          npm install license-checker --no-save || true
          npx license-checker --json > ../node_licenses.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: node-security
          path: |
            ../npm_vulns.json
            ../sbom-node.json
            ../node_licenses.json
            ../npm_audit.sarif

  summarize:
    runs-on: ubuntu-latest
    needs: [python-audit, node-audit]
    env:
      BANDIT_MAX_ISSUES: ${{ github.event.inputs.bandit_max_issues || '3' }}
      DISALLOWED_LICENSES: ${{ github.event.inputs.disallowed_licenses || 'GPL-3.0,AGPL-3.0,LGPL-3.0,SSPL,BUSL-1.1' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-security
          path: python
      - uses: actions/download-artifact@v4
        with:
          name: node-security
          path: node
      - name: Build security dashboard and summary
        run: |
          cp node/npm_audit.sarif ./npm_audit.sarif || true
          cp python/pip_audit.sarif ./pip_audit.sarif || true
          cp python/bandit_report.sarif ./bandit_report.sarif || true
          cp python/python_vulns.json ./python_vulns.json || true
          cp node/npm_vulns.json ./npm_vulns.json || true
          cp python/safety_report.txt ./safety_report.txt || true
          cp python/sbom-python.json ./sbom-python.json || true
          cp node/sbom-node.json ./sbom-node.json || true
          cp sbom-unified.json ./sbom-unified.json || true
          mkdir -p reports
          python tools/security_dashboard.py --dashboard reports/security_dashboard.md --summary-file security_summary.txt || true
          ls -la reports || true
      - name: Aggregate summary for PR/UI
        id: sarif_summary
        run: |
          summary="Security dashboard did not produce a summary."
          if [ -f security_summary.txt ]; then
            summary=$(cat security_summary.txt)
          fi
          echo "summary<<'EOF'" >> $GITHUB_OUTPUT
          echo "$summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: reports/security_dashboard.md
      - name: Upload dashboard to repo
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/security_dashboard.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update security dashboard [skip ci]"
          git push || true
      - name: Upload SARIF bundle
        uses: actions/upload-artifact@v4
        with:
          name: sarif-bundle
          path: |
            npm_audit.sarif
            pip_audit.sarif
            bandit_report.sarif
      - name: Secret scan (custom regex)
        run: python tools/secret_scan.py || true
      - name: License policy evaluation
        run: python tools/license_policy_eval.py "$DISALLOWED_LICENSES" || true
      - name: Unified SBOM
        run: |
          cp python/sbom-python.json ./sbom-python.json || true
          cp node/sbom-node.json ./sbom-node.json || true
          python tools/unify_sbom.py
      - uses: actions/upload-artifact@v4
        with:
          name: unified-sbom
          path: sbom-unified.json
      - name: Quick summary
        run: |
          echo 'Python vulnerabilities:'
          grep -i '"severity":' python/python_vulns.json || true
          echo 'Node vulnerabilities:'
          grep -i '"severity":' node/npm_vulns.json || true
      - name: Evaluate security thresholds
        id: evaluate
        run: |
          high_py=$(grep -i '"severity": "HIGH"' python/python_vulns.json | wc -l || true)
          crit_py=$(grep -i '"severity": "CRITICAL"' python/python_vulns.json | wc -l || true)
          high_js=$(grep -i 'high' node/npm_vulns.json | wc -l || true)
          crit_js=$(grep -i 'critical' node/npm_vulns.json | wc -l || true)
          npm_sarif_levels=$(python - <<'PY'
            import json, os
            sarif_path = "node/npm_audit.sarif"
            counts = {"error":0,"warning":0,"note":0}
            if os.path.exists(sarif_path):
                with open(sarif_path, "r", encoding="utf-8") as f:
                    data = json.load(f)
                for res in data.get("runs", [{}])[0].get("results", []):
                    counts[res.get("level","note")] = counts.get(res.get("level","note"),0)+1
            print(f"{counts['error']} {counts['warning']} {counts['note']}")
            PY
          )
          npm_err=$(echo "$npm_sarif_levels" | awk '{print $1}')
          npm_warn=$(echo "$npm_sarif_levels" | awk '{print $2}')
          bandit_total=$(python -c "import json,os; p='python/bandit_report.json'; print(len(json.load(open(p)).get('results',[])) if os.path.exists(p) else 0)")
          python_bad=$(cat license_bad_python.txt 2>/dev/null)
          node_bad=$(cat license_bad_node.txt 2>/dev/null)
          echo "Disallowed licenses (Python): ${python_bad:-NONE}"
          echo "Disallowed licenses (Node): ${node_bad:-NONE}"
          echo "High PY: $high_py / Critical PY: $crit_py / High JS: $high_js / Critical JS: $crit_js / npm audit errors: $npm_err / warnings: $npm_warn / Bandit: $bandit_total (limit $BANDIT_MAX_ISSUES)"
          if [ "$bandit_total" -gt "$BANDIT_MAX_ISSUES" ] || [ "$high_py" -gt 0 ] || [ "$crit_py" -gt 0 ] || [ "$high_js" -gt 0 ] || [ "$crit_js" -gt 0 ] || [ "$npm_err" -gt 0 ] || [ -n "$python_bad" ] || [ -n "$node_bad" ]; then
            echo "CREATE_ISSUE=true" >> $GITHUB_ENV
            echo "SECURITY_SUMMARY=HighPY=$high_py;CritPY=$crit_py;HighJS=$high_js;CritJS=$crit_js;Bandit=$bandit_total;Limit=$BANDIT_MAX_ISSUES;npmErr=$npm_err;npmWarn=$npm_warn" >> $GITHUB_ENV
            echo "WILL_FAIL=true" >> $GITHUB_ENV
            echo "create_issue=true" >> $GITHUB_OUTPUT
            echo "will_fail=true" >> $GITHUB_OUTPUT
          else
            echo "CREATE_ISSUE=false" >> $GITHUB_ENV
            echo "WILL_FAIL=false" >> $GITHUB_ENV
            echo "create_issue=false" >> $GITHUB_OUTPUT
            echo "will_fail=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload security summary
        if: steps.evaluate.outputs.create_issue == 'true'
        run: echo "$SECURITY_SUMMARY" > security_summary.txt
      - uses: actions/upload-artifact@v4
        if: steps.evaluate.outputs.create_issue == 'true'
        with:
          name: security-summary
          path: security_summary.txt
      - name: Comment on PR security summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SARIF_SUMMARY: ${{ steps.sarif_summary.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            let summary = process.env.SARIF_SUMMARY || '';
            let dashboardContent = '';
            
            // Try to read summary
            if (!summary) {
              try { summary = fs.readFileSync('security_summary.txt','utf8'); } catch(e) { summary = ''; }
            }
            
            // Try to read dashboard for rich PR comment
            try {
              dashboardContent = fs.readFileSync('reports/security_dashboard.md','utf8');
            } catch(e) {
              console.log('Dashboard file not found, using summary only');
            }
            
            const artifactsHint = "\n\n**Artifacts**: security-dashboard, sarif-bundle, unified-sbom";
            const body = dashboardContent 
              ? `## 🔒 Security Audit Results\n\n${dashboardContent}\n${artifactsHint}`
              : (summary || 'Security audit completed (no summary available).') + artifactsHint;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Create security issue (non-PR)
        if: steps.evaluate.outputs.create_issue == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary='';
            try { summary = fs.readFileSync('security_summary.txt','utf8'); } catch(e) {}
            const title = 'Security alert: HIGH/CRITICAL vulnerabilities or Bandit issues detected';
            const body = `Automated security audit detected problems.\n\nSummary:\n${summary}\n\nUnified SBOM uploaded as artifact 'unified-sbom'.\n\nBandit limit: ${process.env.BANDIT_MAX_ISSUES}\nDisallowed licenses list: ${process.env.DISALLOWED_LICENSES}`;
            await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['security']});
      - name: Enforce policy (fail build)
        if: steps.evaluate.outputs.will_fail == 'true'
        run: exit 1
      - name: Notify Slack on critical findings
        if: steps.evaluate.outputs.will_fail == 'true'
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            summary="${{ steps.sarif_summary.outputs.summary }}"
            curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"🚨 Security audit failed: $summary\"}" "$WEBHOOK" || true
          fi
      - name: Auto-close resolved security issues
        if: steps.evaluate.outputs.will_fail != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Automated audit passed; closing security issue.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
