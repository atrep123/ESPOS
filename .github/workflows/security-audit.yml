name: Security Audit

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tooling
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pip-audit safety cyclonedx-bom bandit
      - name: pip-audit
        run: pip-audit --progress-spinner off --output json > python_vulns.json || true
      - name: safety scan
        run: safety check --full-report > safety_report.txt || true
      - name: Bandit (security static analysis)
        run: bandit -q -r . -f json -o bandit_report.json || true
      - name: SBOM (Python)
        run: cyclonedx-bom -o sbom-python.json
      - uses: actions/upload-artifact@v4
        with:
          name: python-security
          path: |
            python_vulns.json
            safety_report.txt
            bandit_report.json
            sbom-python.json

  node-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_designer_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: npm ci || npm install
      - name: npm audit
        run: npm audit --json > ../npm_vulns.json || true
      - name: SBOM (Node)
        run: npx @cyclonedx/cyclonedx-npm --output-file ../sbom-node.json --include-dev || true
      - uses: actions/upload-artifact@v4
        with:
          name: node-security
          path: |
            ../npm_vulns.json
            ../sbom-node.json

  summarize:
    runs-on: ubuntu-latest
    needs: [python-audit, node-audit]
    env:
      BANDIT_MAX_ISSUES: 0
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-security
          path: python
      - uses: actions/download-artifact@v4
        with:
          name: node-security
          path: node
      - name: Secret scan (custom regex)
        run: |
          python tools/secret_scan.py || true
      - name: Unified SBOM
        run: |
          cp python/sbom-python.json ./sbom-python.json || true
          cp node/sbom-node.json ./sbom-node.json || true
          python tools/unify_sbom.py
      - uses: actions/upload-artifact@v4
        with:
          name: unified-sbom
          path: sbom-unified.json
      - name: Quick summary
        run: |
          echo 'Python vulnerabilities:'
          grep -i '"severity":' python/python_vulns.json || true
          echo 'Node vulnerabilities:'
          grep -i '"severity":' node/npm_vulns.json || true
      - name: Fail on high or critical (policy)
        run: |
          high_py=$(grep -i '"severity": "HIGH"' python/python_vulns.json | wc -l || true)
          crit_py=$(grep -i '"severity": "CRITICAL"' python/python_vulns.json | wc -l || true)
          high_js=$(grep -i 'high' node/npm_vulns.json | wc -l || true)
          crit_js=$(grep -i 'critical' node/npm_vulns.json | wc -l || true)
          bandit_total=$(python - <<'PY'
import json,sys
try:
  data=json.load(open('python/bandit_report.json'))
  print(len(data.get('results',[])))
except Exception:
  print(0)
PY
          )
          echo "Bandit total issues: $bandit_total"
          if [ "$bandit_total" -gt "$BANDIT_MAX_ISSUES" ] || [ "$high_py" -gt 0 ] || [ "$crit_py" -gt 0 ] || [ "$high_js" -gt 0 ] || [ "$crit_js" -gt 0 ]; then
            echo "High/Critical vulnerability or Bandit threshold exceeded." > security_summary.txt
            printf "high_py=%s\ncrit_py=%s\nhigh_js=%s\ncrit_js=%s\nbandit_total=%s\n" "$high_py" "$crit_py" "$high_js" "$crit_js" "$bandit_total" >> security_summary.txt
            echo "::set-output name=create_issue::true" || true
            echo "create_issue=true" >> $GITHUB_ENV
          else
            echo "Security thresholds OK." > security_summary.txt
            echo "create_issue=false" >> $GITHUB_ENV
          fi
      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security_summary.txt
      - name: Create security issue
        if: env.create_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security_summary.txt','utf8');
            const title = 'Security alert: HIGH/CRITICAL vulnerabilities or Bandit issues detected';
            const body = `Automated security audit detected problems.\n\nSummary:\n${summary}\n\nUnified SBOM uploaded as artifact 'unified-sbom'.`; 
            await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body});
      - name: Enforce policy (fail build)
        if: env.create_issue == 'true'
        run: exit 1
          if [ "$high_py" -gt 0 ] || [ "$crit_py" -gt 0 ] || [ "$high_js" -gt 0 ] || [ "$crit_js" -gt 0 ]; then
            echo 'High/Critical vulnerability detected.'
            exit 1
          fi
