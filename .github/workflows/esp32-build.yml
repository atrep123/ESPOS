name: ESP32 Firmware Build

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'platformio.ini'
      - '.github/workflows/esp32-build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'platformio.ini'
      - '.github/workflows/esp32-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Build firmware
        run: pio run -e esp32-s3-devkitm-1
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware-esp32-s3-devkitm-1
          path: |
            .pio/build/esp32-s3-devkitm-1/firmware.bin
            .pio/build/esp32-s3-devkitm-1/firmware.elf
