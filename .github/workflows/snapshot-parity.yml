name: Snapshot Parity

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  snapshot-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pillow

      - name: Generate snapshots
        env:
          ESP32OS_HEADLESS: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python tools/run_snapshot_parity.py \
            --scenes examples/demo_scene.json examples/ui_demo.json \
            --baseline reports/baseline \
            --out-dir reports/snapshots \
            --threshold 0

      - name: Token lint (report-only)
        run: |
          python tools/token_lint.py --paths ui_designer_preview.py ui_components.py ui_themes.py || true

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshots
          path: reports/snapshots/
