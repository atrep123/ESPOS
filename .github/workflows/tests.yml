name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      PYTEST_ADDOPTS: "--capture=tee-sys"
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run tests
      run: |
        python -m pytest -v --tb=short || (echo "Pytest failed" && exit 1)
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          .pytest_cache/
          test_*.html
          test_*.json
    - name: Simulator snapshot (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p reports
        python sim_run.py --max-frames 1 --snapshot reports/sim_snapshot_matrix.txt --no-unicode --no-color --width 80 --height 24
        python sim_run.py --max-frames 1 --snapshot reports/sim_snapshot_matrix.png --no-unicode --no-color --width 80 --height 24 || true
        python sim_run.py --max-frames 1 --snapshot reports/sim_snapshot_matrix.html --no-unicode --no-color --width 80 --height 24 || true
      continue-on-error: true
    - name: Upload simulator snapshot (Ubuntu)
      if: always() && matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: sim-snapshot-matrix-${{ matrix.os }}-py${{ matrix.python-version }}
        path: reports/sim_snapshot_matrix.*

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run ruff
      run: ruff check .
      continue-on-error: true
    
    - name: Run mypy
      run: mypy --install-types --non-interactive . || true
      continue-on-error: true

  tools-tests:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      PYTEST_ADDOPTS: "--capture=tee-sys"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Run tools unit tests
      run: python -m pytest -q test/test_npm_audit_to_sarif.py test/test_license_policy_eval.py test/test_esp32os_launcher.py test/test_ui_designer_preview_pending.py
    - name: Simulator snapshot (text+png)
      run: |
        mkdir -p reports
        python sim_run.py --max-frames 1 --snapshot reports/sim_snapshot.txt --no-unicode --no-color --width 80 --height 24
        python sim_run.py --max-frames 1 --snapshot reports/sim_snapshot.png --no-unicode --no-color --width 80 --height 24 || true
      continue-on-error: true
    - name: Upload simulator snapshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sim-snapshot
        path: reports/sim_snapshot.*
