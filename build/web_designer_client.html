<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32OS Web UI Designer - Collaborative Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }
        
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #toolbar {
            background: #2b2b2b;
            border-bottom: 1px solid #444;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        #toolbar h1 {
            font-size: 16px;
            font-weight: 600;
            color: #4ec9b0;
            margin-right: auto;
        }
        
        #toolbar input, #toolbar button {
            padding: 6px 12px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
            border-radius: 4px;
            font-size: 13px;
        }
        
        #toolbar button {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        #toolbar button:hover {
            background: #4a4a4a;
        }
        
        #toolbar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #toolbar .status {
            font-size: 12px;
            color: #888;
        }
        
        #toolbar .status.connected {
            color: #4ec9b0;
        }
        
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        #canvas-container {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #252526;
        }
        
        #canvas {
            display: block;
            background: #1a1a1a;
            border: 1px solid #444;
            margin: 20px;
            image-rendering: pixelated;
            cursor: crosshair;
        }
        
        #sidebar {
            width: 300px;
            background: #2b2b2b;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #users {
            padding: 15px;
            border-bottom: 1px solid #444;
        }
        
        #users h2 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #4ec9b0;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
        }
        
        .user-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .cursor {
            position: absolute;
            width: 16px;
            height: 16px;
            pointer-events: none;
            z-index: 1000;
        }
        
        .cursor svg {
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
        }
        
        .cursor-label {
            position: absolute;
            top: 18px;
            left: 16px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            white-space: nowrap;
        }
        
        #log {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        #log h2 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #4ec9b0;
        }
        
        .log-entry {
            padding: 4px 0;
            color: #888;
        }
        
        .log-entry.info {
            color: #4ec9b0;
        }
        
        .log-entry.warning {
            color: #ffa07a;
        }
        
        .log-entry.error {
            color: #f48771;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <h1>🎨 ESP32OS Web UI Designer</h1>
            <input type="text" id="projectId" placeholder="Project ID" aria-label="Project ID" value="demo_project">
            <input type="text" id="userName" placeholder="Your name" aria-label="Your name" value="User">
            <button id="connectBtn">Connect</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
            <span class="status" id="status">Not connected</span>
        </div>
        
        <div id="main">
            <div id="canvas-container">
                <canvas id="canvas" width="640" height="320"></canvas>
            </div>
            
            <div id="sidebar">
                <div id="users">
                    <h2>👥 Connected Users</h2>
                    <div id="usersList"></div>
                </div>
                
                <div id="log">
                    <h2>📝 Activity Log</h2>
                    <div id="logEntries"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Configuration
        const API_BASE = 'http://localhost:8000/api';
        const WS_BASE = 'ws://localhost:8000/ws';
        
        // State
        let ws = null;
        let projectId = null;
        let userId = null;
        let users = new Map();
        let design = null;
        let scale = 5; // Zoom factor
        
        // DOM elements
        const projectIdInput = document.getElementById('projectId');
        const userNameInput = document.getElementById('userName');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const usersListEl = document.getElementById('usersList');
        const logEntriesEl = document.getElementById('logEntries');
        const canvasContainer = document.getElementById('canvas-container');
        
        // Logging
        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEntriesEl.appendChild(entry);
            logEntriesEl.scrollTop = logEntriesEl.scrollHeight;
        }
        
        // Update users list
        function updateUsersList() {
            usersListEl.innerHTML = '';
            for (const [uid, user] of users.entries()) {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerHTML = `
                    <div class="user-color" style="background: ${user.color}"></div>
                    <span>${user.name}${uid === userId ? ' (you)' : ''}</span>
                `;
                usersListEl.appendChild(item);
            }
        }
        
        // Update cursor display
        function updateCursor(user) {
            let cursor = document.getElementById(`cursor-${user.id}`);
            if (!cursor) {
                cursor = document.createElement('div');
                cursor.id = `cursor-${user.id}`;
                cursor.className = 'cursor';
                cursor.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 16 16">
                        <path d="M0 0 L0 12 L4 8 L6 14 L8 13 L6 7 L10 7 Z" 
                              fill="${user.color}" stroke="white" stroke-width="0.5"/>
                    </svg>
                    <div class="cursor-label" style="background-color: ${user.color}">${user.name}</div>
                `;
                canvasContainer.appendChild(cursor);
            }
            
            // Position cursor relative to canvas
            const canvasRect = canvas.getBoundingClientRect();
            const containerRect = canvasContainer.getBoundingClientRect();
            cursor.style.left = `${canvasRect.left - containerRect.left + user.cursor_x * scale}px`;
            cursor.style.top = `${canvasRect.top - containerRect.top + user.cursor_y * scale}px`;
        }
        
        // Remove cursor
        function removeCursor(userId) {
            const cursor = document.getElementById(`cursor-${userId}`);
            if (cursor) {
                cursor.remove();
            }
        }
        
        // Render design on canvas
        function renderDesign() {
            if (!design || !design.scenes || design.scenes.length === 0) {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#666';
                ctx.font = '14px monospace';
                ctx.fillText('No design loaded', 20, 30);
                return;
            }
            
            const scene = design.scenes[0];
            const width = scene.width || 128;
            const height = scene.height || 64;
            
            // Resize canvas to fit design
            canvas.width = width * scale;
            canvas.height = height * scale;
            
            // Clear background
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw widgets
            if (scene.widgets) {
                for (const widget of scene.widgets) {
                    const x = (widget.x || 0) * scale;
                    const y = (widget.y || 0) * scale;
                    const w = (widget.width || 20) * scale;
                    const h = (widget.height || 10) * scale;
                    
                    // Background
                    ctx.fillStyle = '#3c3c3c';
                    ctx.fillRect(x, y, w, h);
                    
                    // Border
                    if (widget.border !== false) {
                        ctx.strokeStyle = '#4ec9b0';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x, y, w, h);
                    }
                    
                    // Text
                    if (widget.text) {
                        ctx.fillStyle = '#d4d4d4';
                        ctx.font = `${10 * scale}px monospace`;
                        ctx.fillText(widget.text, x + 4, y + h / 2 + 3);
                    }
                }
            }
        }
        
        // WebSocket message handlers
        function handleMessage(data) {
            const msg = JSON.parse(data);
            
            switch (msg.op) {
                case 'session_state':
                    userId = msg.user_id;
                    users.clear();
                    for (const user of (msg.session.users || [])) {
                        users.set(user.id, user);
                    }
                    log(`Connected as ${userNameInput.value}`, 'info');
                    updateUsersList();
                    break;
                
                case 'user_joined':
                    users.set(msg.user.id, msg.user);
                    log(`${msg.user.name} joined`, 'info');
                    updateUsersList();
                    break;
                
                case 'user_left': {
                    const leftUser = users.get(msg.user_id);
                    if (leftUser) {
                        log(`${leftUser.name} left`, 'info');
                        users.delete(msg.user_id);
                        removeCursor(msg.user_id);
                        updateUsersList();
                    }
                    break;
                }
                
                case 'cursor': {
                    const user = users.get(msg.user_id);
                    if (user) {
                        user.cursor_x = msg.x;
                        user.cursor_y = msg.y;
                        updateCursor(user);
                    }
                    break;
                }
                
                case 'widget_add':
                case 'widget_update':
                case 'widget_delete':
                    log(`${msg.op} by user ${msg.user_id}`, 'warning');
                    // Reload design from server
                    loadDesign();
                    break;
            }
        }
        
        // Load design from server
        async function loadDesign() {
            try {
                const response = await fetch(`${API_BASE}/projects/${projectId}/design`);
                if (!response.ok) {
                    throw new Error(`Failed to load design: ${response.statusText}`);
                }
                design = await response.json();
                renderDesign();
            } catch (error) {
                log(`Error loading design: ${error.message}`, 'error');
            }
        }
        
        // Connect to WebSocket
        function connect() {
            projectId = projectIdInput.value.trim();
            if (!projectId) {
                alert('Please enter a project ID');
                return;
            }
            
            const userName = userNameInput.value.trim() || 'Anonymous';
            
            statusEl.textContent = 'Connecting...';
            statusEl.className = 'status';
            
            ws = new WebSocket(`${WS_BASE}/projects/${projectId}`);
            
            ws.onopen = () => {
                log('WebSocket connected', 'info');
                statusEl.textContent = 'Connected';
                statusEl.className = 'status connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                
                // Send join message
                ws.send(JSON.stringify({
                    op: 'join',
                    user_name: userName
                }));
                
                // Load design
                loadDesign();
                
                // Start heartbeat
                setInterval(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ op: 'heartbeat' }));
                    }
                }, 10000);
            };
            
            ws.onmessage = (event) => {
                handleMessage(event.data);
            };
            
            ws.onerror = (error) => {
                log(`WebSocket error: ${error}`, 'error');
            };
            
            ws.onclose = () => {
                log('WebSocket disconnected', 'warning');
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'status';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                users.clear();
                updateUsersList();
            };
        }
        
        // Disconnect from WebSocket
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }
        
        // Track mouse movement on canvas
        canvas.addEventListener('mousemove', (e) => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            
            ws.send(JSON.stringify({
                op: 'cursor',
                x: x,
                y: y
            }));
        });
        
        // Event listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        
        // Initial render
        renderDesign();
        
        log('Web UI Designer ready', 'info');
        log('Enter a project ID and click Connect to start', 'info');
    </script>
</body>
</html>
